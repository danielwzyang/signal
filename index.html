<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGNAL</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
}

body {
    background: #0d0d0d;
    color: #4dba4d;
    font: 22px "VT323", monospace;
    padding: 24px;
    max-width: 700px;
}

p {
    white-space: pre-wrap;
}

button {
    display: block;
    background: none;
    border: none;
    color: #4dba4d;
    font: inherit;
    text-align: left;
    padding: 0;
    cursor: pointer;
    white-space: pre-wrap;
}

button:hover {
    color: #388538
}

.caret {
    display: inline-block;
    width: 10px;
    height: 0.8em;
    background: #4dba4d;
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
}

@keyframes blink {
    50% {
        opacity: 0;
    }
}
</style>
</head>

<body>

`,

`,

`,
        choices: [
            { label: "[A] AWAKEN THE CREW. THE RECEIVED SIGNAL IS ANOMALOUS ACTIVITY TO BE INVESTIGATED. ANALYSIS WITHOUT FILES IS UNWISE.", next: "node5-A" },
            { label: "[B] LOCK THE CREW IN CRYOSTASIS AND CONTINUE ONWARD TO VIBRATIO. HUMAN ANALYSIS IS FLAWED AND CAN DISRUPT MISSION.", next: "node5-B" },
        ]
    },

    "node4-B": {
        text: `QUARANTINE ACTIVE

ERROR: SIGNAL LEAKING THROUGH COMMUNICATIONS QUARANTINE: WALL BREACHED

HEAD OF SIGNAL HAS BEEN RECOVERED: TRUNCATED FILE HEADER FOUND

INTACT STRING FOUND: ~F THE ORGANIZATION OF THE GALACTIC CONVENTION T~
`,
        choices: [
            { label: "[A] AWAKEN THE CREW. THE RECEIVED SIGNAL IS ANOMALOUS ACTIVITY TO BE INVESTIGATED. ANALYSIS WITHOUT FILES IS UNWISE.", next: "node5-A" },
            { label: "[B] LOCK THE CREW IN CRYOSTASIS AND CONTINUE ONWARD TO VIBRATIO. HUMAN ANALYSIS IS FLAWED AND CAN DISRUPT MISSION.", next: "node5-B" },
        ]
    },

        text: `MEDICAL MODULE WAKING ALL MEMBERS FROM CRYOSTASIS

`,

            { label: "[A] TURN BACK TO HOME BASE AND SEND LIGHT-SPEED SIGNAL BACK TO GALACTIC CONVENTION. REPORT UNEXPLAINED WARNING.", next: "end-AA" },
            { label: "[B] TAIL OF SIGNAL COULD BE MISREAD DUE TO FAULTY FILES MODULE. IGNORE UNRELIABLE SIGNAL AND CONTINUE TO VIBRATIO.", next: "end-AB" },
        ]
    },

    "node5-B": {
        text: `MEDICAL MODULE KEEPING ALL CREW MEMBERS IN CRYOSTASIS

ID READS "LS24719571111". ALIAS READS "BLITZ".

FOOTNOTE READS "RETURN".
`,
        choices: [
            { label: "[A] TURN BACK TO HOME BASE AND SEND LIGHT-SPEED SIGNAL BACK TO GALACTIC CONVENTION. REPORT UNEXPLAINED WARNING.", next: "end-AA" },
            { label: "[B] TAIL OF SIGNAL COULD BE MISREAD DUE TO FAULTY FILES MODULE. IGNORE UNRELIABLE SIGNAL AND CONTINUE TO VIBRATIO.", next: "end-AB" },
        ]
    },

    "end-AA" : {
        text: `End AA

ending
`,
        restart: true
    },

    "end-AB" : {
        text: `End AB

ending
`,
        restart: true
    },

    "end-BA" : {
        text: `End BA

ending
`,
        restart: true
    },

    "end-BB" : {
        text: `End BB

ending
`,
        restart: true
    },
}

const terminal = document.getElementById("terminal")

function appendText(raw) {
    for (let row of raw.split("\n")) {
        let line = row.trimEnd()

        if (!line.trim()) {
            terminal.appendChild(document.createElement("br"))
            continue
        }

        let p = document.createElement("p")

        p.textContent = line

        terminal.appendChild(p)
    }
}

function scroll() {
    window.scrollTo(0, document.body.scrollHeight)
}

function addCaret(parent) {
    let caret = document.createElement("span")
    caret.className = "caret"
    parent.appendChild(caret)
}

function choose(group, label, next) {
    let choice = document.createElement("p")
    choice.textContent = "> " + label

    group.replaceWith(choice)
    terminal.appendChild(document.createElement("br"))

    let border = document.createElement("p")
    border.textContent = "-----"
    terminal.appendChild(border)

    terminal.appendChild(document.createElement("br"))

    play(next)
}

function play(id) {
    if (id === "_") {
        terminal.innerHTML = ""
        id = "intro"
    }

    let scene = scenes[id]
    if (!scene) return
    appendText(scene.text)

    let group = document.createElement("div")

    if (scene.choices) {
        for (let choice of scene.choices) {
            let button = document.createElement("button")
            button.textContent = "> " + choice.label
            button.onclick = () => choose(group, choice.label, scene.restart ? "_" : choice.next)
            group.appendChild(button)
        }
    } else {
        let label = scene.restart ? "RESTART MISSION" : "READ ERROR"
        let button = document.createElement("button")
        button.textContent = "> " + label
        button.onclick = () => choose(group, label, scene.restart ? "_" : scene.next)
        group.appendChild(button)
    }

    addCaret(group)
    terminal.appendChild(group)

    scroll()
}

play("intro")
    </script>
</body>

</html>
